name: CI-CD

# Mirrors the Jenkins pipeline: build/test -> SonarQube -> Docker push -> update manifest.
# Argo CD on your minikube watches spring-boot-app-manifests/ and deploys the new tag.

on:
  push:
    branches: [ main ]
    paths:
      - 'spring-boot-app/**'          # only app changes trigger a build...
      - '.github/workflows/**'
      # NOTE: spring-boot-app-manifests/** is intentionally NOT listed, so the
      # manifest-update commit this workflow makes can never re-trigger itself.
  workflow_dispatch:                   # lets you run it manually from the Actions tab

env:
  IMAGE_NAME: YOUR_DOCKERHUB_USERNAME/ultimate-cicd   # <-- CHANGE THIS
  APP_DIR: spring-boot-app
  MANIFESTS_DIR: spring-boot-app-manifests

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required so the workflow can push the manifest update back
    env:
      TAG: ${{ github.run_number }}                    # like Jenkins BUILD_NUMBER
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}          # optional
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}    # optional, e.g. http://<ec2-ip>:9000
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}   # optional

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build and Test (Maven)
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean package

      # Skips automatically if you haven't added the SONAR_TOKEN secret yet.
      - name: Static Code Analysis (SonarQube)
        if: ${{ env.SONAR_TOKEN != '' }}
        working-directory: ${{ env.APP_DIR }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url="${SONAR_HOST_URL}"
          -Dsonar.login="${SONAR_TOKEN}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}      # Dockerfile lives in spring-boot-app/ and copies target/spring-boot-web.jar
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest

      # GitOps "image updater": rewrite the image line and commit it back.
      # Pushes made with the built-in GITHUB_TOKEN do NOT trigger workflows,
      # so this cannot create a loop (the path filter above is a second safeguard).
      - name: Update Deployment Manifest
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Idempotent: matches whatever image line exists and overwrites it every run.
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${TAG}|" "${MANIFESTS_DIR}/deployment.yml"
          git add "${MANIFESTS_DIR}/deployment.yml"
          git commit -m "ci: update image to ${IMAGE_NAME}:${TAG} [skip ci]" || { echo "No change"; exit 0; }
          git push

      # Optional "Report -> Slack" branch from your diagram. Fires only on failure
      # and only if you've set the SLACK_WEBHOOK_URL secret.
      - name: Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":x: Pipeline failed for ${GITHUB_REPOSITORY} (run #${TAG}) — ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${SLACK_WEBHOOK_URL}"

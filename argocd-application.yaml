apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-app
  namespace: default          # the namespace where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/flipflops404/Jenkins-full-project.git
    targetRevision: main
    path: spring-boot-app-manifests     # Argo CD watches this folder
  destination:
    server: https://kubernetes.default.svc   # the same (in-cluster) minikube
    namespace: default
  syncPolicy:
    automated:
      prune: true        # delete resources removed from git
      selfHeal: true     # revert manual cluster drift back to git state
    syncOptions:
      - CreateNamespace=true
